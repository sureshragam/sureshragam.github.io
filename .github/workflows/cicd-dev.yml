name: cicd-dev

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache npm dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: |
          npm ci || (
            echo "npm ci failed, performing full install" &&
            rm -rf node_modules package-lock.json &&
            npm install
          )

      # Run tests (optional)
      # - name: Run tests
      #   run: npm test

  build-and-deploy:
    environment: DEV

    runs-on: ubuntu-latest

    needs: test

    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3: Cache npm dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          npm ci || (
            echo "npm ci failed, performing full install" &&
            rm -rf node_modules package-lock.json &&
            npm install
          )

      # Step 5: Inject Environment Variables
      - name: Inject Environment Variables
        env:
          REACT_APP_WHATSAPP_NUMBER: ${{ secrets.REACT_APP_WHATSAPP_NUMBER }}
          REACT_APP_WHATSAPP_MESSAGE: ${{ secrets.REACT_APP_WHATSAPP_MESSAGE }}
          REACT_APP_MAIL_ID: ${{ secrets.REACT_APP_MAIL_ID }}
          REACT_APP_LINKEDIN_URL: ${{ secrets.REACT_APP_LINKEDIN_URL }}
          REACT_APP_GITHUB_URL: ${{ secrets.REACT_APP_GITHUB_URL }}

        run: |
          {
            echo "REACT_APP_WHATSAPP_NUMBER=$REACT_APP_WHATSAPP_NUMBER"
            echo "REACT_APP_WHATSAPP_MESSAGE=$REACT_APP_WHATSAPP_MESSAGE"
            echo "REACT_APP_MAIL_ID=$REACT_APP_MAIL_ID"
            echo "REACT_APP_LINKEDIN_URL=$REACT_APP_LINKEDIN_URL"
            echo "REACT_APP_GITHUB_URL=$REACT_APP_GITHUB_URL"
          } >> .env

      # Step 6: Build project
      - name: Build project
        run: npm run build

      # Step 7: Configure Git
      - name: Configure Git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        run: |
          git config --global user.name "Github Action"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin \
          https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git

      # Step 8: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}