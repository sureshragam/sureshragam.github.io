name: cicd-prod

permissions:
  contents: read

on:
  push:
    branches:
      - release/main

  workflow_dispatch:

jobs:
  test:
    environment: PROD

    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: |
          npm ci || (
            echo "npm ci failed, performing full install" &&
            rm -rf node_modules package-lock.json &&
            npm install
          )

      # Run tests
      - name: Run tests
        run: npm test

  continuous-integration:
    environment: PROD

    runs-on: ubuntu-latest

    needs: test

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache dependencies
      - name: Cache Node.js dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies
      - name: Install dependencies
        run: |
          npm ci || (
            echo "npm ci failed, performing full install" &&
            rm -rf node_modules package-lock.json &&
            npm install
          )

      # Inject Environment Variables
      - name: Inject Environment Variables
        env:
          REACT_APP_WHATSAPP_NUMBER: ${{ secrets.REACT_APP_WHATSAPP_NUMBER }}
          REACT_APP_WHATSAPP_MESSAGE: ${{ secrets.REACT_APP_WHATSAPP_MESSAGE }}
          REACT_APP_MAIL_ID: ${{ secrets.REACT_APP_MAIL_ID }}
          REACT_APP_LINKEDIN_URL: ${{ secrets.REACT_APP_LINKEDIN_URL }}
          REACT_APP_GITHUB_URL: ${{ secrets.REACT_APP_GITHUB_URL }}

        run: |
          {
            echo "REACT_APP_WHATSAPP_NUMBER=$REACT_APP_WHATSAPP_NUMBER"
            echo "REACT_APP_WHATSAPP_MESSAGE=$REACT_APP_WHATSAPP_MESSAGE"
            echo "REACT_APP_MAIL_ID=$REACT_APP_MAIL_ID"
            echo "REACT_APP_LINKEDIN_URL=$REACT_APP_LINKEDIN_URL"
            echo "REACT_APP_GITHUB_URL=$REACT_APP_GITHUB_URL"
          } >> .env

      # Build project
      - name: Build project
        run: npm run build

      # Upload build artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: build